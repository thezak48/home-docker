networks:
  internal:
    external: true

services:
  silo-transcode:
    image: ${SILO_IMAGE:-ghcr.io/silo-server/silo-server:latest}
    container_name: silo-transcode
    restart: unless-stopped
    environment:
      MODE: transcode
      DATABASE_URL: postgres://${POSTGRES_SILO_USER:-silo}:${POSTGRES_SILO_PASSWORD:-silo}@${SILO_POSTGRES_HOST:-silo-postgres}:${SILO_POSTGRES_PORT:-5432}/${POSTGRES_SILO_DB:-silo}?sslmode=disable
      REDIS_URL: redis://${SILO_REDIS_HOST:-silo-redis}:${SILO_REDIS_PORT:-6379}
      SILO_PLUGIN_CACHE_DIR: /var/lib/silo/plugins
      PORT: "8080"
      NODE_NAME: ${NODE_NAME}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env — generate one with openssl rand -base64 48}
    ports:
      - "${TRANSCODE_PORT:-8082}:8080"
    volumes:
      - ${MEDIA_ROOT:?Set MEDIA_ROOT in .env to the host media path}:${MEDIA_CONTAINER_ROOT:-/mnt/media}:ro
      - ${SILO_DATA_ROOT:-/opt/silo}/plugins:/var/lib/silo/plugins
      - ${SILO_DATA_ROOT:-/opt/silo}/transcode:/tmp/silo-transcode
    networks:
      - internal
    #devices:
    #  - /dev/dri:/dev/dri
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
