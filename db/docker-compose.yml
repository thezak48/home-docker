  silo-postgres:
    image: pgvector/pgvector:pg18
    container_name: silo-postgres
    restart: unless-stopped
    shm_size: ${POSTGRES_SHM_SIZE:-8gb}
    environment:
      POSTGRES_USER: ${POSTGRES_SILO_USER:-silo}
      POSTGRES_PASSWORD: ${POSTGRES_SILO_PASSWORD:-silo}
      POSTGRES_DB: ${POSTGRES_SILO_DB:-silo}
    ports:
      - "5432:5432"
    volumes:
      - ${MNT_CONFIGS:-/opt/silo}/silo/postgres:/var/lib/postgresql
    command: ["postgres", "-c", "listen_addresses=*"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SILO_USER:-silo}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  silo-redis:
    image: redis:alpine
    container_name: silo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ${MNT_CONFIGS:-/opt/silo}/silo/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal
